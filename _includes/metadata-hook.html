<script>
/* 头像左上角主题切换代理按钮 */
(function () {
  function addAvatarThemeBtn() {
    if (document.getElementById('avatar-theme-btn')) return;

    var avatar = document.getElementById('avatar');
    var profileWrapper = document.querySelector('.profile-wrapper');
    if (!avatar || !profileWrapper) return;

    // 让 profile-wrapper 作为定位父元素（它的 overflow 是 visible）
    profileWrapper.style.setProperty('position', 'relative', 'important');

    // 计算 avatar 相对于 profile-wrapper 的偏移，把按钮放到头像左上角外侧
    function positionBtn(btn) {
      var pwRect = profileWrapper.getBoundingClientRect();
      var avRect = avatar.getBoundingClientRect();
      var relLeft = avRect.left - pwRect.left;
      var relTop  = avRect.top  - pwRect.top;
      btn.style.left = (relLeft - 10) + 'px';
      btn.style.top  = (relTop  - 10) + 'px';
    }

    // 判断当前是否深色模式
    function isDark() {
      return document.documentElement.getAttribute('data-mode') === 'dark'
        || (!document.documentElement.hasAttribute('data-mode') && window.matchMedia('(prefers-color-scheme: dark)').matches);
    }

    var btn = document.createElement('button');
    btn.id = 'avatar-theme-btn';
    btn.title = '切换主题';
    btn.type = 'button';
    btn.style.cssText = [
      'position: absolute',
      'z-index: 9999',
      'width: 28px',
      'height: 28px',
      'border-radius: 50%',
      'border: none',
      'background: rgba(40,40,60,0.75)',
      'color: #fff',
      'font-size: 13px',
      'cursor: pointer',
      'display: flex',
      'align-items: center',
      'justify-content: center',
      'padding: 0',
      'margin: 0',
      'box-shadow: 0 1px 4px rgba(0,0,0,0.4)'
    ].join(';');

    function updateIcon() {
      btn.innerHTML = isDark() ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    }
    updateIcon();

    btn.addEventListener('click', function (e) {
      e.preventDefault();
      e.stopPropagation();
      var orig = document.getElementById('mode-toggle');
      if (orig) orig.click();
      setTimeout(updateIcon, 80);
    });

    // 监听主题属性变化，同步图标
    var observer = new MutationObserver(function () { updateIcon(); });
    observer.observe(document.documentElement, {
      attributes: true,
      attributeFilter: ['data-mode']
    });

    profileWrapper.appendChild(btn);
    positionBtn(btn);

    // 窗口 resize 时重新定位
    window.addEventListener('resize', function () { positionBtn(btn); });

    // 隐藏底部原始按钮
    var orig = document.getElementById('mode-toggle');
    if (orig) {
      orig.style.setProperty('display', 'none', 'important');
      orig.style.setProperty('visibility', 'hidden', 'important');
      var border = orig.nextElementSibling;
      if (border && border.classList.contains('icon-border')) {
        border.style.display = 'none';
      }
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () {
      setTimeout(addAvatarThemeBtn, 200);
    });
  } else {
    setTimeout(addAvatarThemeBtn, 200);
  }
})();
</script>
